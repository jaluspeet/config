[colors]
draw_bold_text_with_bright_colors = true

[env]
TERM = "xterm-256color"
ALACRITTY = "true"

[font]
size = 13

[[keyboard.bindings]]
chars = "\u001BB"
key = "Left"
mods = "Alt"

[scrolling]
history = 100000

[window]
dynamic_title = true
title = "Terminal"

[window.padding]
x = 0
y = 0

[window.dimensions]
columns = 200
lines = 60

[general]
live_config_reload = true

[colors.primary]
background = '0x222222'
foreground = '0xFFFFFF'

[colors.cursor]
text = '0x0E1415'
cursor = '0xCECECE'

[colors.normal]
black = '0x0E1415'
red = '0xE25D56'
green = '0x73CA50'
yellow = '0xE9BF58'
blue = '0x4A88E4'
magenta = '0x915CAF'
cyan = '0x23ACDD'
white = '0xF0F0F0'

[colors.bright]
black = '0x777777'
red = '0xF36868'
green = '0x88DB3F'
yellow = '0xF0BF7A'
blue = '0x6F8FDB'
magenta = '0xE987E9'
cyan = '0x4AC9E2'
white = '0xFFFFFF'
